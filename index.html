<!DOCTYPE html>
<html>
<head>
<title>Movie Review AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>🎬 Movie Review Sentiment Analyzer</h1>
    
    <input type="text" id="reviewInput" placeholder="Enter movie review">
    <button onclick="analyzeSentiment()">Analyze</button>

    <h2 id="resultDisplay">Result: Waiting...</h2>

    <script>
        async function analyzeSentiment() {
            const review = document.getElementById('reviewInput').value;
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ review: review })
            });
            const data = await response.json();
            document.getElementById('resultDisplay').innerText = "Result: " + data.sentiment;
        }
    </script>
</body>
