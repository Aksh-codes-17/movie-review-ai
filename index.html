<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Review AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎬 Movie Review Sentiment Analyzer</h1>
    
    <input type="text" id="userInput" placeholder="Enter movie review">
    
    <button onclick="analyzeText()">Analyze</button>

    <h2 id="displayResult">Result: Waiting...</h2>

    <script>
        function analyzeText() {
            // 1. Get the text from the input box
            const text = document.getElementById('userInput').value.toLowerCase();
            const resultElement = document.getElementById('displayResult');

            // 2. The "Brain" (Keywords)
            const goodWords = ['amazing', 'great', 'love', 'fantastic', 'good', 'best'];
            const badWords = ['boring', 'worst', 'bad', 'terrible', 'hate', 'waste'];

            // 3. Logic: Check if words match
            let isPositive = goodWords.some(word => text.includes(word));
            let isNegative = badWords.some(word => text.includes(word));

            // 4. Update the screen
            if (isPositive) {
                resultElement.innerText = "Result: Positive 😊";
                resultElement.style.color = "lightgreen";
            } else if (isNegative) {
                resultElement.innerText = "Result: Negative 😞";
                resultElement.style.color = "tomato";
            } else {
                resultElement.innerText = "Result: Neutral 😐 (Try words like 'amazing' or 'boring')";
                resultElement.style.color = "white";
            }
        }
    </script>

</body>
</html>
